version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: scinexa-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      MONGODB_URI: mongodb://mongo:27017/scinexa_conferences
      JWT_SECRET: change-this-super-secret-key-change-this-super-secret-key
    ports:
      - "8080:8080"
    depends_on:
      - mongo

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api


volumes:
  mongo_data:
