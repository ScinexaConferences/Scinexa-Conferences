version: "3.9"

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/scinexa_conferences}
      JWT_SECRET: change-this-super-secret-key-change-this-super-secret-key
    ports:
      - "8080:8080"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
