api:
  runs-on: ubuntu-latest

  defaults:
    run:
      working-directory: apps/api

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: apps/api/package.json

    - run: npm install

    - run: npm run build